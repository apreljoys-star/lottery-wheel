<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轉盤抽獎系統</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/STYLE.css') }}">
</head>
<body>
    <div class="container">
    <h1>🎡 轉盤抽獎系統</h1>
    <div class="layout">
        <div class="left-panel">
            <h3>獎品列表</h3>
            <textarea id="prizesInput" rows="5">大獎&#10;二獎&#10;三獎&#10;神秘禮物&#10;精美文具&#10;安慰獎</textarea>
            
            <h3>抽獎者列表</h3>
            <textarea id="optionsInput" rows="8">{{ options | safe }}</textarea>
            
            <div class="button-group">
                <button id="updateBtn">更新名單</button>
                <button id="spinBtn">開始抽獎</button>
                <button id="clearBtn" onclick="clearHistory()">清除得獎紀錄</button>
            </div>

            <div class="result-box">
                <h3>本次抽獎結果</h3>
                <p id="resultText">獎品：- <br> 得獎者：-</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="wheel-wrapper">
                <div class="pointer">▼</div>
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
            </div>
            
            <div class="history-box">
                <h3>得獎紀錄</h3>
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>序號</th>
                            <th>獎品</th>
                            <th>得獎者</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    // This takes the plain text from Python and turns it into a list
    const initialOptions = `{{ options | safe }}`.split('\n').filter(name => name.trim() !== "");
    
    // This tells the wheel to draw the PRIZES (the 6 items in the top box)
    function getPrizes() {
        const prizeText = document.getElementById('prizesInput').value;
        return prizeText.split('\n').filter(p => p.trim() !== "");
    }
</script>

    <script src="{{ url_for('static', filename='JS/SCRIPT.js') }}"></script>
</body>
</body>
</html>
